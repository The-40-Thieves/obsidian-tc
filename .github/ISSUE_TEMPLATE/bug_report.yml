name: Bug report
description: Report a defect in obsidian-tc
labels: ["bug", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug.

        Before submitting, please search existing issues to avoid duplicates.

  - type: input
    id: version
    attributes:
      label: obsidian-tc version
      placeholder: "0.0.0"
    validations:
      required: true

  - type: input
    id: obsidian-version
    attributes:
      label: Obsidian version
      placeholder: "1.7.0"
    validations:
      required: true

  - type: dropdown
    id: os
    attributes:
      label: Operating system
      options:
        - Linux
        - macOS
        - Windows
        - Other
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: Clear, concise description of the bug.
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
      description: Numbered steps. Include exact tool calls if applicable.
      placeholder: |
        1. Configure with ...
        2. Call tool `...` with args `...`
        3. See error ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: What should have happened?
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs
      description: Paste relevant log output. Redact secrets.
      render: shell

  - type: checkboxes
    id: code-of-conduct
    attributes:
      label: Code of Conduct
      options:
        - label: I agree to follow the [Code of Conduct](https://github.com/The-40-Thieves/obsidian-tc/blob/main/CODE_OF_CONDUCT.md)
          required: true

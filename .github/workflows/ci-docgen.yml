name: ci-docgen

# Docs drift gate (THE-476): regenerate the docgen surfaces and fail if the committed pages are
# stale. Triggers on any change that could move a documented fact (server/shared source) OR a
# hand-edit of a generated page (docs/wiki). Makes regeneration mandatory, so the tool/config
# reference can never drift from the code.
on:
  pull_request:
    paths:
      - 'packages/server/**'
      - 'packages/shared/**'
      - 'docs/wiki/**'
      - 'docs/src/content/**'
      - 'bun.lock'
      - '.github/workflows/ci-docgen.yml'
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  drift-gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: ./.github/actions/setup-repo
      - name: docs drift gate (regenerate + fail if stale)
        working-directory: packages/server
        run: bun run docgen:render -- --check
      - name: narrative fact gate (THE-566 — no stale tool-count / golden-set numbers in prose)
        working-directory: packages/server
        run: bun run docgen:facts-check

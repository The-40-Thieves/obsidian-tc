name: ci-docgen

# Docs drift gate (THE-476): regenerate the docgen surfaces and fail if the committed pages are
# stale. Triggers on any change that could move a documented fact (server/shared source) OR a
# hand-edit of a generated page (docs/wiki). Makes regeneration mandatory, so the tool/config
# reference can never drift from the code.
on:
  pull_request:
    paths:
      - 'packages/server/**'
      - 'packages/shared/**'
      - 'docs/wiki/**'
      - 'bun.lock'
      - '.github/workflows/ci-docgen.yml'
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  drift-gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: '1.3.14'
      - name: cache bun install
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: bun-${{ runner.os }}-
      - name: install
        run: bun install --frozen-lockfile --ignore-scripts
      - name: docs drift gate (regenerate + fail if stale)
        working-directory: packages/server
        run: bun run docgen:render -- --check

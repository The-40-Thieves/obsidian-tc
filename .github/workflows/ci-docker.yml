# PR gate: build the Docker image and smoke-boot it, so a Dockerfile regression is caught ON THE PR
# instead of at release time (publish.yml's build-docker pushes straight to ghcr.io on a v* tag).
# Build-only (no registry push) + a version smoke. This is also the gate the multi-stage Dockerfile
# rewrite can iterate against (THE-276).
name: ci-docker

on:
  pull_request:
    paths:
      - "Dockerfile"
      - ".dockerignore"
      - "packages/server/**"
      - "packages/shared/**"
      - "package.json"
      - "bun.lock"
      - ".github/workflows/ci-docker.yml"
  workflow_dispatch:

concurrency:
  group: ci-docker-${{ github.ref }}
  cancel-in-progress: true

# Least privilege (CodeQL actions/missing-workflow-permissions): this job only checks out and
# builds the image locally (no registry push); the gha layer cache uses the Actions runtime token.
permissions:
  contents: read

jobs:
  docker-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3
      - name: build image (no push, load into the local daemon)
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          file: Dockerfile
          push: false
          load: true
          tags: obsidian-tc:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
      # Mirrors ci-install-smoke's `cli.js version` check, but inside the container: proves the image
      # builds, the bun runtime + bundle load, and the entrypoint runs — no vault/mount/stdin needed.
      - name: smoke — containerized CLI reports the package version
        run: |
          want=$(node -p "require('./packages/server/package.json').version")
          got=$(docker run --rm obsidian-tc:ci version)
          echo "container reports: $got (want $want)"
          [ "$got" = "$want" ] || { echo "::error::container reports '$got', expected '$want'"; exit 1; }
          echo "ok: containerized server built and reports $want"

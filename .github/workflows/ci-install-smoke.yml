name: ci-install-smoke
# Proves the cross-platform install/run claim: on linux, macOS, and windows, build the
# host native addon + the bundled CLI, then assert (1) the host .node prebuild loads,
# (2) a missing prebuild degrades to the pure-JS fallback instead of crashing (G2.2 #9),
# (3) the CLI boots against a throwaway vault under both bun and node and reaches its
# stdio-ready line, and (4) the built CLI reports the package version under both runtimes.
on:
  pull_request:
    paths:
      - 'packages/**'
      - 'tsconfig.base.json'
      - 'bun.lock'
      - 'SKILLS.md'
      - 'scripts/write-smoke-config.mjs'
      - '.github/workflows/ci-install-smoke.yml'
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  install-smoke:
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          # Read-only smoke job: never pushes, so don't leave the token in .git/config.
          persist-credentials: false
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: '1.3.14'
      # node is used for the loader assertions and to write the config (Node escapes
      # OS-native paths correctly); the CLI itself runs under bun (bun:sqlite adapter).
      - uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
        with:
          node-version: '24'
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable (pinned, audit #11)
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          workspaces: packages/native
      - run: bun install --frozen-lockfile
      # Build the host-triple native addon (.node) + the libraries the CLI bundles.
      - name: build native (host triple)
        working-directory: packages/native
        run: bun run build
      - name: build shared
        working-directory: packages/shared
        run: bun run build
      - name: build server
        working-directory: packages/server
        run: bun run build

      # 1) The freshly-built host prebuild resolves and the compiled binary is active.
      - name: native addon loads the host .node
        run: |
          node -e "const n=require('./packages/native'); if(!n.nativeLoaded||typeof n.cosineSimilarity!=='function'||typeof n.cosineBatch!=='function'||typeof n.tokenize!=='function'||typeof n.bm25Score!=='function'){console.error('native addon did not load: nativeLoaded='+n.nativeLoaded);process.exit(1)} console.log('ok: native addon loaded (nativeLoaded=true)')"

      # 2) A missing prebuild must degrade to the JS fallback, never crash (G2.2 #9).
      - name: missing prebuild falls back to JS (no crash)
        run: |
          node -e "const fs=require('node:fs'),path=require('node:path'); const dir='packages/native'; const f=fs.readdirSync(dir).find(x=>x.endsWith('.node')); if(!f){console.error('no host .node was built');process.exit(1)} const p=path.join(dir,f); fs.renameSync(p,p+'.bak'); try{ const n=require('./packages/native'); if(n.nativeLoaded!==false){console.error('expected JS fallback, got nativeLoaded='+n.nativeLoaded);process.exit(1)} if(typeof n.cosineSimilarity!=='function'){console.error('JS fallback is missing exports');process.exit(1)} console.log('ok: graceful JS fallback (nativeLoaded=false)'); } finally { fs.renameSync(p+'.bak',p); }"

      # 3) The CLI boots against a throwaway vault and reaches stdio-ready under BOTH runtimes.
      #    The bundle is built `--target node`, but bun:sqlite is imported lazily inside the Bun
      #    adapter, so the node-targeted output never statically imports `bun:` and loads under
      #    node too (the npx / Cursor / VS Code / Claude-Desktop lane). stdin is closed so the
      #    stdio transport ends and the process exits cleanly after printing ready.
      - name: CLI starts against a throwaway vault
        run: |
          node scripts/write-smoke-config.mjs "$RUNNER_TEMP/smoke-vault" "$RUNNER_TEMP/smoke-cache" "$RUNNER_TEMP/smoke-config.json"
          out=$(bun packages/server/dist/cli.js "$RUNNER_TEMP/smoke-config.json" < /dev/null 2>&1) || true
          echo "$out"
          echo "$out" | grep -q "ready on stdio" || { echo "::error::CLI did not reach stdio-ready"; exit 1; }
          echo "ok: CLI reached stdio-ready"
      - name: CLI starts under node (npx / Cursor / VS Code / Claude-Desktop lane)
        run: |
          out=$(node packages/server/dist/cli.js "$RUNNER_TEMP/smoke-config.json" < /dev/null 2>&1) || true
          echo "$out"
          echo "$out" | grep -q "ready on stdio" || { echo "::error::node lane did not reach stdio-ready (is bun:sqlite hoisted into the node bundle?)"; exit 1; }
          echo "ok: node lane reached stdio-ready"
      # 4) Release-coherence guard: the BUILT bundle must report the package version under both
      #    runtimes — catches a stale/mislabeled build (e.g. a 1.0.0 bundle published as 1.2.1).
      - name: built CLI reports the package version (node + bun)
        run: |
          want=$(node -p "require('./packages/server/package.json').version")
          got_node=$(node packages/server/dist/cli.js version)
          got_bun=$(bun packages/server/dist/cli.js version)
          echo "want=$want node=$got_node bun=$got_bun"
          [ "$got_node" = "$want" ] || { echo "::error::node reports $got_node, expected $want"; exit 1; }
          [ "$got_bun" = "$want" ] || { echo "::error::bun reports $got_bun, expected $want"; exit 1; }
          echo "ok: built CLI reports $want under node and bun"
      # 5) The self-contained .mcpb ships no node_modules, so under Node better-sqlite3 is
      #    unresolvable. Prove the server still boots via the built-in node:sqlite fallback on every
      #    OS (THE-276) — this is the one-click bundle's actual runtime path.
      - name: CLI boots under node WITHOUT better-sqlite3 (the .mcpb / node:sqlite fallback)
        run: |
          rm -rf node_modules/better-sqlite3 packages/server/node_modules/better-sqlite3 || true
          out=$(node packages/server/dist/cli.js "$RUNNER_TEMP/smoke-config.json" < /dev/null 2>&1) || true
          echo "$out"
          echo "$out" | grep -q "ready on stdio" || { echo "::error::node:sqlite fallback did not reach stdio-ready"; exit 1; }
          echo "ok: booted under node via the node:sqlite fallback (no better-sqlite3)"
      # 6) The published bin must start with a node shebang. bun build emits none, and without it
      #    npm's launcher shim hands the .js to the Windows file association (Script Host) instead of
      #    node, so `obsidian-tc` silently no-ops (exit 0, no output). Guard the root cause directly
      #    (a full global-install shim test needs the published tarball's rewritten workspace deps).
      - name: built CLI bin carries a node shebang (npm shim correctness)
        run: |
          head -1 packages/server/dist/cli.js | grep -qx '#!/usr/bin/env node' || { echo "::error::dist/cli.js is missing the '#!/usr/bin/env node' shebang; npm generates broken bin shims (Windows silent no-op)"; exit 1; }
          echo "ok: dist/cli.js carries the node shebang"
      # 7) Tarball guard: assert what npm actually PUBLISHES, not what the source says. The
      #    source-level check (scripts/check-version-coherence.mjs via ci-version.yml) asserts
      #    packages/plugin/manifest.json and was fully green while v1.9.1 shipped a 1.7.0 companion
      #    plugin and no SKILLS.md — the source was correct, the vendored BUILD was stale, and
      #    nothing looked at the artifact. Pack for real, extract, and check the bytes that ship.
      - name: published tarball ships SKILLS.md + a version-matched companion plugin
        run: |
          want=$(node -p "require('./packages/server/package.json').version")
          # Keep every path relative to the workspace. On Windows $RUNNER_TEMP is a drive-letter
          # path, and GNU tar under Git Bash treats the colon in it as a remote-host separator,
          # failing with "tar (child): Cannot connect to D: resolve failed". Linux and macOS are
          # unaffected, so this only breaks one leg of the matrix. Relative paths work on all 3.
          rm -rf .tarball-check && mkdir -p .tarball-check
          (cd packages/server && npm pack --silent --pack-destination ../../.tarball-check >/dev/null)
          tgz=$(ls .tarball-check/obsidian-tc-*.tgz | head -1)
          [ -n "$tgz" ] || { echo "::error::npm pack produced no tarball"; exit 1; }
          tar -xzf "$tgz" -C .tarball-check
          test -f .tarball-check/package/SKILLS.md || { echo "::error::tarball is missing SKILLS.md (the agent onboarding guide never reaches npm)"; exit 1; }
          test -f .tarball-check/package/dist/plugin/main.js || { echo "::error::tarball is missing dist/plugin/main.js — the companion plugin was not vendored, so 'plugin install' is broken"; exit 1; }
          got=$(node -p "require('./.tarball-check/package/dist/plugin/manifest.json').version")
          echo "want=$want tarball_plugin=$got"
          [ "$got" = "$want" ] || { echo "::error::tarball ships companion plugin $got, expected $want — a stale packages/plugin/dist was vendored"; exit 1; }
          rm -rf .tarball-check
          echo "ok: tarball ships SKILLS.md + companion plugin $want"

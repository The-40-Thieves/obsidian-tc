name: ci-model-service
on:
  pull_request:
    paths:
      - 'services/bge-m3-service/**'
      - '.github/workflows/ci-model-service.yml'
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# The Python BGE-M3 model service (services/bge-m3-service). Its heavy model deps (torch,
# FlagEmbedding, sentence-transformers) are lazy-imported INSIDE methods, so CI installs only the
# light surface (fastapi + pydantic + httpx + pytest) and the tests mock the model layer. No GPU,
# no weights: this gates the contracts, config, the single-worker scheduler, and the HTTP surface
# (auth, 413/429). The live model load + golden-set retrieval eval run off-CI on GPU hardware.
jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/bge-m3-service
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: '3.11'
      - name: install package (no heavy deps) + light test deps
        # THE-528: install from a HASHED lock, not open ranges. The previous form resolved
        # `httpx`/`pytest`/`ruff` completely unconstrained and fastapi/pydantic by floor only, so
        # the job built against whatever PyPI served that day — not reproducible, and a compromised
        # or merely broken upstream release landed straight in CI. --require-hashes makes pip refuse
        # anything whose artifact does not match the lock.
        #
        # Covers the CI test surface only. The heavy ML stack (torch, FlagEmbedding,
        # sentence-transformers) is deliberately not installed here, so this lock is not a runtime
        # deployment manifest. Regenerate with:
        #   uv pip compile requirements-ci.in --generate-hashes --python-version 3.11 \
        #     -o requirements-ci.txt
        run: |
          python -m pip install --upgrade pip
          pip install --no-deps -e .
          pip install --require-hashes -r requirements-ci.txt
      - name: ruff
        run: ruff check .
      - name: py_compile
        run: python -m py_compile obsidian_tc_bge/*.py
      - name: pytest
        run: pytest -q

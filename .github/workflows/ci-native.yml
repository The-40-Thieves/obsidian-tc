name: ci-native
on:
  pull_request:
    paths:
      - 'packages/native/**'
      - '.github/workflows/ci-native.yml'
  push:
    branches: [main]

# M0 verifies the napi-rs build pipeline on all three OSes (Linux, macOS,
# Windows) via native-host builds. Cross-compiled prebuilds (e.g. aarch64-linux)
# and the full release prebuild matrix land in G2.5 (Release engineering).
jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - host: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            triple: linux-x64-gnu
          - host: macos-latest
            target: x86_64-apple-darwin
            triple: darwin-x64
          - host: macos-14
            target: aarch64-apple-darwin
            triple: darwin-arm64
          - host: windows-latest
            target: x86_64-pc-windows-msvc
            triple: win32-x64-msvc
    runs-on: ${{ matrix.host }}
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.3.13'
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: packages/native
      - run: bun install --frozen-lockfile --ignore-scripts
      - name: build
        working-directory: packages/native
        run: bun run build -- --target ${{ matrix.target }}
        shell: bash
      - name: test
        working-directory: packages/native
        run: cargo test --release --target ${{ matrix.target }}
        shell: bash
      - name: upload prebuild
        uses: actions/upload-artifact@v7
        with:
          name: native-${{ matrix.triple }}
          path: packages/native/*.node
          if-no-files-found: error

name: ci-native
on:
  pull_request:
    paths:
      - 'packages/native/**'
      - '.github/workflows/ci-native.yml'
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# M0 verifies the napi-rs build pipeline on the host OSes (Linux, macOS, Windows).
# PR runs build + cargo test in DEBUG for speed; push to main builds + tests in
# RELEASE (and uploads the prebuild). Cross-compiled prebuilds and the full release
# prebuild matrix land in G2.5 (Release engineering).
jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - host: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            triple: linux-x64-gnu
          # macOS CI builds arm64 only — the macOS hosted-runner pool is capped at 5
          # concurrent jobs account-wide (GitHub Free), so the x64 darwin build is left
          # to the G2.5 release prebuild matrix to keep PR queues from stalling.
          - host: macos-14
            target: aarch64-apple-darwin
            triple: darwin-arm64
          - host: windows-latest
            target: x86_64-pc-windows-msvc
            triple: win32-x64-msvc
    runs-on: ${{ matrix.host }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: '1.3.14'
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable (pinned, audit #11)
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          workspaces: packages/native
      - name: cache bun install
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: bun-${{ runner.os }}-
      - run: bun install --frozen-lockfile --ignore-scripts
      # PR builds debug (fast compile); push to main builds release for the prebuild.
      - name: build
        working-directory: packages/native
        run: bun run ${{ github.event_name == 'push' && 'build' || 'build:debug' }} -- --target ${{ matrix.target }}
        shell: bash
      # F1 guard: napi build must not regenerate/clobber the committed hand-written loader
      # (index.js/index.d.ts); its generated output is redirected to gitignored napi-generated.*
      # files. A non-empty diff here means that redirect regressed.
      - name: assert build did not clobber committed loader (F1)
        working-directory: packages/native
        run: git diff --exit-code -- index.js index.d.ts
        shell: bash
      # PR tests in debug (fast); push to main tests in release.
      - name: test
        working-directory: packages/native
        run: cargo test ${{ github.event_name == 'push' && '--release' || '' }} --target ${{ matrix.target }}
        shell: bash
      - name: upload prebuild
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: native-${{ matrix.triple }}
          path: packages/native/*.node
          if-no-files-found: error

  # Build-only validation of the musl cross-compile path (THE-264 follow-up). The two linux-musl
  # prebuilds ship via `napi build -x` (cargo-zigbuild) in publish.yml — a toolchain that runs only
  # on a linux runner and had never been exercised anywhere. This job cross-compiles both musl
  # targets on the x64 ubuntu runner and asserts they link, WITHOUT publishing, so a broken musl
  # build fails here on a PR instead of aborting the immutable release. Debug build; no upload.
  musl-cross-build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target: [x86_64-unknown-linux-musl, aarch64-unknown-linux-musl]
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: '1.3.14'
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable (pinned, audit #11)
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          workspaces: packages/native
      # zig + cargo-zigbuild are the cross toolchain napi `-x` drives for musl.
      - uses: goto-bus-stop/setup-zig@abea47f85e598557f500fa1fd2ab7464fcb39406 # v2
        with:
          version: 0.13.0
      - uses: taiki-e/install-action@ed67fa35ac944f3a9b33f12c4dd43b6f31a47e20 # v2
        with:
          tool: cargo-zigbuild
      - run: bun install --frozen-lockfile --ignore-scripts
      - name: cross-build musl .node (build-only, no publish)
        working-directory: packages/native
        run: |
          bun run build:debug -- --target ${{ matrix.target }} -x
          ls -la ./*.node
          test -n "$(ls ./*.node 2>/dev/null)" || { echo "::error::no .node produced for ${{ matrix.target }}"; exit 1; }
        shell: bash

  # Pure-JS fallback gate (G2.5 §10.1 / R10). Runs the server suite with NO
  # compiled .node present: `--ignore-scripts` skips the napi build so the native
  # require throws, and OBSIDIAN_TC_FORCE_JS_FALLBACK=1 forces loadNative() to the
  # JS path even if a binary were present. This exercises the pure-JS
  # implementations in search/native.ts end-to-end so they stay correct as the
  # native API evolves; a throwing or incorrect fallback fails the vitest run here.
  fallback-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: '1.3.14'
      # vitest forks Node workers; node:sqlite + --experimental-sqlite need Node >=22.
      - uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
        with:
          node-version: '24'
      - name: cache bun install
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: bun-${{ runner.os }}-
      - name: install (skip napi build -> no .node)
        run: bun install --frozen-lockfile --ignore-scripts
      - name: server tests on pure-JS fallback
        run: node ./node_modules/vitest/vitest.mjs run
        working-directory: packages/server
        env:
          OBSIDIAN_TC_FORCE_JS_FALLBACK: '1'

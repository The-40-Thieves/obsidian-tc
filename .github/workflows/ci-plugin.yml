name: ci-plugin
on:
  pull_request:
    paths:
      - 'packages/plugin/**'
      - 'biome.json'
      - 'tsconfig.base.json'
      - 'bun.lock'
      - '.github/workflows/ci-plugin.yml'
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# The companion plugin (THE-180 / G4.M4) is a standalone esbuild bundle that
# externalizes the Obsidian runtime; it has no @the-40-thieves/obsidian-tc-shared dependency, so
# lint + typecheck + build run without compiling the other packages first. The
# build artifact (dist/main.js + manifest.json) is what a user drops into a vault's
# .obsidian/plugins/obsidian-tc folder. Live-Obsidian behavior is verified manually
# (see the PR's verification section); CI proves the bundle lints, typechecks, and
# builds — it cannot exercise a running Obsidian.
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: '1.3.14'
      - name: cache bun install
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: bun-${{ runner.os }}-
      - name: install
        run: bun install --frozen-lockfile --ignore-scripts
      - name: biome check
        run: bun run lint
      - name: typecheck plugin
        run: bun run typecheck
        working-directory: packages/plugin
      - name: build plugin
        run: bun run build
        working-directory: packages/plugin
      - name: upload artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: obsidian-tc-plugin
          path: |
            packages/plugin/dist/main.js
            packages/plugin/dist/manifest.json

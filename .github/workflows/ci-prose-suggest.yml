name: ci-prose-suggest

# THE-477 (docgen 7/7) — advisory narrative sync.
#
# The drift gate (ci-docgen) guarantees the GENERATED regions are current. It says nothing about
# whether the hand-written prose around them still reads correctly after a capability changed. That
# is a judgement, not a fact, so this never edits a file: it opens an issue with the assembled
# prompt and the reference diff, and a human decides.
#
# NO MODEL CREDENTIAL. `docgen:suggest` falls back to dry-run when DOCGEN_LLM_* are unset, emitting
# the assembled prompt instead of calling anything. That is deliberate here: a secret in a public
# repo's CI is an exfiltration target, and an advisory step that a human reads is more faithful to
# "human-gated" than a model writing prose someone then rubber-stamps. Anyone wanting the model
# round-trip can run the same command locally with the env vars set.
#
# push-to-main only, never pull_request — a fork PR must not be able to trigger a job that opens
# issues with content it controls.
on:
  push:
    branches: [main]
    paths:
      - 'packages/server/src/**'
      - 'packages/shared/src/**'
      - 'docs/wiki/**'
      - 'docs/src/content/**'
      - 'README.md'
      - 'ARCHITECTURE.md'

permissions:
  contents: read
  issues: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  suggest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 2 # need the parent commit to diff the pushed range
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: '1.3.14'
      - run: bun install --frozen-lockfile --ignore-scripts
      - name: assemble prose suggestion
        working-directory: packages/server
        # Both are GitHub-set SHAs rather than user content, but they go through env anyway: a
        # ${{ }} expansion inside a run block is a habit that becomes an injection the day someone
        # swaps in a title or branch name.
        env:
          BEFORE_SHA: ${{ github.event.before }}
          AFTER_SHA: ${{ github.sha }}
        run: |
          set -uo pipefail
          # The script early-exits when no generated surface moved in this range, which is the
          # noise gate: a normal code push produces nothing.
          bun run docgen:suggest -- --range "${BEFORE_SHA}..${AFTER_SHA}" \
            > /tmp/prose-suggestion.txt 2>&1 || true
          head -c 400 /tmp/prose-suggestion.txt
      - name: publish suggestion
        env:
          GH_TOKEN: ${{ github.token }}
          SHA: ${{ github.sha }}
        run: |
          set -uo pipefail
          if grep -q "no prose suggestion needed" /tmp/prose-suggestion.txt; then
            echo "No generated surface moved — nothing to review."
            exit 0
          fi
          # Always land it in the job summary: zero API surface, and it survives even if the issue
          # step is skipped or fails.
          {
            echo "## Advisory prose suggestion"
            echo
            echo "A generated reference surface changed. The narrative around it may need a look."
            echo
            echo '```'
            head -c 60000 /tmp/prose-suggestion.txt
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

          # One rolling issue rather than one per push, so this cannot become a notification
          # firehose that gets muted (and therefore useless) within a week.
          TITLE="docs: narrative may lag the generated reference"
          EXISTING=$(gh issue list --state open --search "$TITLE in:title" --json number --jq '.[0].number // empty')
          BODY_FILE=/tmp/issue-body.md
          {
            echo "The generated reference moved in ${SHA}. The hand-written prose around those blocks may need updating."
            echo
            echo "This is **advisory** — nothing was written, and no model was called (dry-run)."
            echo
            echo "<details><summary>Assembled prompt + reference diff</summary>"
            echo
            echo '```'
            head -c 55000 /tmp/prose-suggestion.txt
            echo '```'
            echo
            echo "</details>"
          } > "$BODY_FILE"

          if [ -n "$EXISTING" ]; then
            gh issue comment "$EXISTING" --body-file "$BODY_FILE"
            echo "Commented on existing issue #$EXISTING"
          else
            gh issue create --title "$TITLE" --body-file "$BODY_FILE"
          fi

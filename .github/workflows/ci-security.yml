name: ci-security
on:
  pull_request:
  push:
    branches: [main]
  schedule:
    - cron: '0 6 * * 1'  # weekly: catch newly disclosed advisories against a static tree
  workflow_dispatch:  # allow an on-demand run of the scheduled full-repo scans below

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Supply-chain + secret gates that complement the always-on CodeQL (default setup, 4 languages)
# and Semgrep. gitleaks GATES (a committed secret must block) and scans the working tree (--no-git):
# the PR gate is about what ships, not 483 commits of immutable history. Benign secret-shaped content
# (scanner regexes, fake test fixtures, doc examples, build output) is allowlisted in .gitleaks.toml.
# The dependency audits are continue-on-error: a newly disclosed transitive advisory should surface,
# not wall off an unrelated feature PR. gitleaks runs via the official image to avoid the org-license
# requirement of gitleaks-action.
jobs:
  vault-leak:
    # This public repo served a map of a personal vault for two weeks: 227 real note paths, 136 plain-
    # English descriptions of their contents, and a committed SQLite index holding the FULL TEXT of 100
    # notes. Six code reviews missed it -- every one audited the DIFF, none audited the REPO.
    #
    # STRUCTURAL only: CI has no vault, so it cannot tell a real note title from an invented one. The
    # deep check (--vault <path>) runs where the vault lives, which is where such a leak originates.
    name: vault leak (structural)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
        with:
          node-version: 22
      - run: node scripts/check-vault-leak.mjs

  config-threading:
    # knnMinSim shipped DECLARED but unthreaded: it typechecked, it validated, it was documented, and
    # nothing read it. An ablation arm was measured against a config no operator could select. A config
    # key that reaches no consumer is a promise to the operator the code does not keep.
    name: config threading
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
        with:
          node-version: 22
      - run: node scripts/check-config-threading.mjs

  nul-bytes:
    # A literal NUL byte makes a source file BINARY to git and grep: `git diff` degrades to "Binary
    # files differ", so changes to it ship without a reviewable diff, and every grep-based guard,
    # codemod and SAST sweep skips it while still reporting success. Three files carried one.
    name: no NUL bytes in tracked text
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
        with:
          node-version: 22
      - run: node scripts/check-nul-bytes.mjs

  workflow-injection:
    # THE-541: `${{ }}` is expanded into the script TEXT before the shell runs, so an untrusted
    # value carrying a quote plus shell metacharacters executes on the runner with the job's token.
    # The instance found was harmless only because every caller passed a literal — an invariant
    # nothing enforced, on an action THE-505 is about to spread across every workflow.
    name: no untrusted context in shell steps
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
        with:
          node-version: 22
      - run: node scripts/check-workflow-injection.mjs

  gitleaks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - name: gitleaks (secret scan of the working tree; honors .gitleaks.toml)
        # THE-426: pin the scanner image to an immutable digest (was :latest). Refresh with
        # `docker manifest inspect ghcr.io/gitleaks/gitleaks:latest | grep -m1 digest`.
        run: |
          docker run --rm -v "${{ github.workspace }}:/repo" \
            ghcr.io/gitleaks/gitleaks@sha256:b109bc5f8f76a38196a3e413704fc5b9e3c32360bce4e4b603bd6f45b3721dbb \
            detect --no-git --source /repo --config /repo/.gitleaks.toml --no-banner --redact --exit-code 1

  cargo-audit:
    runs-on: ubuntu-latest
    continue-on-error: true
    defaults:
      run:
        working-directory: packages/native
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: ./.github/actions/setup-rust
      - name: install cargo-audit
        run: cargo install cargo-audit --locked
      - name: cargo audit
        run: cargo audit

  bun-audit:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: ./.github/actions/setup-repo
      - name: bun audit
        run: bun audit
      # docs/ is a SEPARATE bun workspace with its own lockfile, and `bun audit` only walks the
      # lockfile it is invoked against — so the root run above never saw the docs toolchain. A high
      # sharp/libvips advisory sat there unnoticed until Dependabot (which scans every manifest)
      # flagged it. Audit it explicitly; the root `overrides` do not reach this tree either, so
      # docs/package.json carries its own.
      - run: bun install --frozen-lockfile --ignore-scripts
        working-directory: docs
      - name: bun audit (docs workspace)
        run: bun audit
        working-directory: docs

  # THE-506: scheduled full-repo SAST via opengrep (the community-maintained OSS continuation of the
  # Semgrep CLI). This complements, rather than duplicates, the external `semgrep-cloud-platform`
  # GitHub App already installed on this repo: that app's PR check is diff-aware (scans only the
  # files a PR changes) and is the right place for per-PR SAST, so this job does NOT run on
  # `pull_request` -- only on the workflow's existing weekly `schedule` (plus `workflow_dispatch` for
  # an on-demand run). A full `--config auto` pass over the whole tree took ~1:40 locally; adding
  # that to every PR would be redundant CI minutes for signal the App already provides on the diff.
  # continue-on-error, matching cargo-audit/bun-audit above: a scheduled scan reports newly-matched
  # findings against a static tree (there is no PR here to block), so it should stay visible without
  # red-Xing the workflow run on an existing, un-triaged finding.
  opengrep-full-scan:
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - name: install opengrep v1.25.0 (pinned binary + checksum)
        run: |
          mkdir -p "$RUNNER_TEMP/opengrep-bin"
          curl -sSL --fail -o "$RUNNER_TEMP/opengrep-bin/opengrep" \
            https://github.com/opengrep/opengrep/releases/download/v1.25.0/opengrep_manylinux_x86
          echo "9ac4aebb47ba3f7b0d8fc641ac8749cb6c2f253f616131a67d9631e00d4bea33  $RUNNER_TEMP/opengrep-bin/opengrep" | sha256sum -c -
          chmod +x "$RUNNER_TEMP/opengrep-bin/opengrep"
          echo "$RUNNER_TEMP/opengrep-bin" >> "$GITHUB_PATH"
      - name: opengrep full scan (community registry ruleset, auto-detected by language)
        run: opengrep scan --config auto --error .

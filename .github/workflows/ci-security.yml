name: ci-security
on:
  pull_request:
  push:
    branches: [main]
  schedule:
    - cron: '0 6 * * 1'  # weekly: catch newly disclosed advisories against a static tree

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Supply-chain + secret gates that complement the always-on CodeQL (default setup, 4 languages)
# and Semgrep. gitleaks GATES (a committed secret must block) and scans the working tree (--no-git):
# the PR gate is about what ships, not 483 commits of immutable history. Benign secret-shaped content
# (scanner regexes, fake test fixtures, doc examples, build output) is allowlisted in .gitleaks.toml.
# The dependency audits are continue-on-error: a newly disclosed transitive advisory should surface,
# not wall off an unrelated feature PR. gitleaks runs via the official image to avoid the org-license
# requirement of gitleaks-action.
jobs:
  vault-leak:
    # This public repo served a map of a personal vault for two weeks: 227 real note paths, 136 plain-
    # English descriptions of their contents, and a committed SQLite index holding the FULL TEXT of 100
    # notes. Six code reviews missed it -- every one audited the DIFF, none audited the REPO.
    #
    # STRUCTURAL only: CI has no vault, so it cannot tell a real note title from an invented one. The
    # deep check (--vault <path>) runs where the vault lives, which is where such a leak originates.
    name: vault leak (structural)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
        with:
          node-version: 22
      - run: node scripts/check-vault-leak.mjs

  config-threading:
    # knnMinSim shipped DECLARED but unthreaded: it typechecked, it validated, it was documented, and
    # nothing read it. An ablation arm was measured against a config no operator could select. A config
    # key that reaches no consumer is a promise to the operator the code does not keep.
    name: config threading
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
        with:
          node-version: 22
      - run: node scripts/check-config-threading.mjs
  gitleaks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - name: gitleaks (secret scan of the working tree; honors .gitleaks.toml)
        # THE-426: pin the scanner image to an immutable digest (was :latest). Refresh with
        # `docker manifest inspect ghcr.io/gitleaks/gitleaks:latest | grep -m1 digest`.
        run: |
          docker run --rm -v "${{ github.workspace }}:/repo" \
            ghcr.io/gitleaks/gitleaks@sha256:b109bc5f8f76a38196a3e413704fc5b9e3c32360bce4e4b603bd6f45b3721dbb \
            detect --no-git --source /repo --config /repo/.gitleaks.toml --no-banner --redact --exit-code 1

  cargo-audit:
    runs-on: ubuntu-latest
    continue-on-error: true
    defaults:
      run:
        working-directory: packages/native
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
      - name: install cargo-audit
        run: cargo install cargo-audit --locked
      - name: cargo audit
        run: cargo audit

  bun-audit:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: '1.3.14'
      - run: bun install --frozen-lockfile --ignore-scripts
      - name: bun audit
        run: bun audit

name: ci-server
on:
  pull_request:
    paths:
      - 'packages/server/**'
      - 'packages/shared/**'
      - 'tsconfig.base.json'
      - 'biome.json'
      - 'bun.lock'
      - '.github/workflows/ci-server.yml'
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.3.13'
      - run: bun install --frozen-lockfile --ignore-scripts
      - name: biome check
        run: bun run lint

  build-test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.3.13'
      # vitest forks Node workers; node:sqlite + --experimental-sqlite require
      # Node >=22 on PATH. setup-node provides it for the test step below.
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
      # M0 tests use node:sqlite and do not need the native / better-sqlite3
      # compiles; --ignore-scripts mirrors the verified local + clean-room run.
      - name: install
        run: bun install --frozen-lockfile --ignore-scripts
      - name: typecheck shared (fully strict)
        run: bun run typecheck
        working-directory: packages/shared
      - name: typecheck server
        run: bun run typecheck
        working-directory: packages/server
      - name: build shared
        run: bun run build
        working-directory: packages/shared
      - name: build server
        run: bun run build
        working-directory: packages/server
      - name: test server (vitest under Node)
        run: node ./node_modules/vitest/vitest.mjs run
        working-directory: packages/server


  bun-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.3.13'
      - run: bun install --frozen-lockfile --ignore-scripts
      - name: bun:sqlite adapter smoke (bun test)
        run: bun test bun-smoke
        working-directory: packages/server

  coverage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.3.13'
      # vitest forks Node workers (node:sqlite + --experimental-sqlite need Node >=22 on PATH).
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
      - run: bun install --frozen-lockfile --ignore-scripts
      # v8 coverage gate: thresholds in vitest.config.ts fail the job under the floor.
      - name: coverage gate
        run: node ./node_modules/vitest/vitest.mjs run --coverage
        working-directory: packages/server

name: ci-server
on:
  pull_request:
    paths:
      - 'packages/server/**'
      - 'packages/shared/**'
      - 'tsconfig.base.json'
      - 'biome.json'
      - 'bun.lock'
      - '.github/workflows/ci-server.yml'
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: ./.github/actions/setup-repo
      - name: biome check
        run: bun run lint
      # THE-525: module boundary gate. Runs in the existing lint job rather than a new workflow so
      # it shares the checkout + install. The wrapper fails on an EMPTY scan as well as on a
      # violation — dependency-cruiser supports typescript <7 and this repo is on 7.x, where a
      # directory scan silently yields zero modules.
      - name: module boundaries (dependency-cruiser)
        run: bun run check:boundaries

  build-test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: '1.3.14'
      # vitest forks Node workers; node:sqlite + --experimental-sqlite require
      # Node >=22 on PATH. setup-node provides it for the test step below.
      - uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
        with:
          node-version: '24'
      - name: cache bun install
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: bun-${{ runner.os }}-
      # M0 tests use node:sqlite and do not need the native / better-sqlite3
      # compiles; --ignore-scripts mirrors the verified local + clean-room run.
      - name: install
        run: bun install --frozen-lockfile --ignore-scripts
      - name: typecheck shared (fully strict)
        run: bun run typecheck
        working-directory: packages/shared
      - name: typecheck server
        run: bun run typecheck
        working-directory: packages/server
      - name: build shared
        run: bun run build
        working-directory: packages/shared
      - name: build server
        run: bun run build
        working-directory: packages/server
      # The v8 coverage gate is platform-independent, so it runs once here on Linux
      # (folded in to avoid a separate full-suite job); macOS/Windows run the same
      # suite without instrumentation for cross-platform verification.
      - name: test server (vitest under Node; coverage gate on Linux)
        run: node ./node_modules/vitest/vitest.mjs run ${{ matrix.os == 'ubuntu-latest' && '--coverage' || '' }}
        working-directory: packages/server

  bun-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: ./.github/actions/setup-repo
      - name: bun:sqlite adapter smoke (bun test)
        run: bun test bun-smoke
        working-directory: packages/server

  perf:
    runs-on: ubuntu-latest
    # THE-503: the motivating incident was a perf run overlapping the Vitest suite -- index/embed
    # throughput read ~51% below baseline and dispatch p99 was 16ms vs an isolated 1ms, and the
    # gate still passed (latency is warn-only). A workflow-level `concurrency:` group only
    # deduplicates runs of the SAME workflow on the SAME ref; it does not stop `perf` racing
    # `build-test`'s Vitest suite within one workflow run, nor two perf runs on different
    # refs/PRs racing each other on shared runner capacity. This job-level group is intentionally
    # NOT ref-scoped (unlike the workflow-level one above) so at most one `perf` job runs anywhere
    # in the repo at a time; `cancel-in-progress: false` because canceling one mid-measurement
    # would still leave a half-written artifact rather than just queuing the newer run.
    concurrency:
      group: perf-exclusive
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: '1.3.14'
      - name: cache bun install
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: bun-${{ runner.os }}-
      - name: install (native build for sqlite-vec)
        run: bun install --frozen-lockfile
      - name: perf gate (isolated - 5 fresh-subprocess samples, gated on the median; THE-503)
        run: bun run perf:gate:isolated
        working-directory: packages/server
      - name: upload perf report
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: perf-report
          path: packages/server/perf-report.json

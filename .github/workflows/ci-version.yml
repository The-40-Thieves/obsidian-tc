name: ci-version
on:
  pull_request:
  push:
    branches: [main]
permissions:
  contents: read
jobs:
  version-coherence:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
      - name: assert all version strings agree
        run: node scripts/check-version-coherence.mjs

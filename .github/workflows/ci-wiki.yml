name: ci-wiki

# GitHub wiki publisher (THE-475). On push to main, mirror the seed pages in docs/wiki/ (some
# hand-authored, some docgen-generated) into the repo's wiki — a SEPARATE git repo at
# <repo>.wiki.git. The drift gate (ci-docgen) guarantees the committed docs/wiki/ pages are fresh, so
# this just syncs them.
#
# PREREQUISITES (one-time, manual):
#   1. Enable Wikis: repo Settings -> Features -> Wikis.
#   2. Create a Home page once in the web UI so the .wiki.git remote exists.
#   3. (Recommended) Add a repo secret WIKI_TOKEN — a fine-grained PAT / App token with wiki write.
#      The default GITHUB_TOKEN cannot push to a wiki on many repos.
# Until (1)+(2) are done this job SKIPS cleanly (no red X) — it never fails a push for a repo whose
# wiki isn't enabled yet.
# Manual-only (workflow_dispatch): the repo already has a HAND-AUTHORED wiki maintained in the web
# UI, so this must never publish automatically. It is kept as an opt-in tool + is non-destructive
# (cp -n never overwrites an existing wiki page). A proper integration = marker-injection of the
# generated tables into the operator's own wiki pages (see THE-475 follow-up); until then this only
# ADDS pages that are absent, and only when a human dispatches it.
on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-wiki
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - name: publish docs/wiki -> GitHub wiki
        env:
          # Prefer a dedicated wiki-write token; fall back to GITHUB_TOKEN (works on repos that allow it).
          WIKI_TOKEN: ${{ secrets.WIKI_TOKEN || github.token }}
          REPO: ${{ github.repository }}
          SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          WIKI_URL="https://x-access-token:${WIKI_TOKEN}@github.com/${REPO}.wiki.git"

          if ! git ls-remote "$WIKI_URL" >/dev/null 2>&1; then
            echo "::notice title=Wiki not enabled::No ${REPO}.wiki.git yet. Enable Wikis + create a Home page once to activate publishing (see this workflow's header). Skipping."
            exit 0
          fi

          if ! git clone --depth 1 "$WIKI_URL" wiki 2>/dev/null; then
            echo "::warning title=Wiki clone failed::check the WIKI_TOKEN secret has wiki-write access. Skipping (best-effort)."
            exit 0
          fi
          # Additive sync: copy the seed pages over; never delete pages authored directly in the wiki.
          cp -n docs/wiki/*.md wiki/  # -n: never overwrite a page authored in the wiki

          cd wiki
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if [ -z "$(git status --porcelain)" ]; then
            echo "::notice::wiki already up to date"
            exit 0
          fi
          git add -A
          git commit -m "docs(wiki): sync from docs/wiki @ ${SHA}"
          # Best-effort: a push-permission failure warns rather than redding the push to main.
          if ! git push 2>/dev/null; then
            echo "::warning title=Wiki push failed::add a fine-grained WIKI_TOKEN secret with wiki write (the default GITHUB_TOKEN may lack it)."
            exit 0
          fi
          echo "::notice title=Wiki published::synced $(find ../docs/wiki -maxdepth 1 -name '*.md' | wc -l) pages"

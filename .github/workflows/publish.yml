name: publish
on:
  push:
    tags: ['v*']

permissions:
  contents: write
  packages: write
  id-token: write
  attestations: write

# Reconciled in M7 (THE-183): 4-platform native matrix (linux-arm64 deferred to v1.1 per the G3
# amendment, THE-141); no cosign/SBOM (also deferred to v1.1); text bun.lock. Fires only on a
# human-pushed v* tag — it is config-verified here, not executed. R5/THE-214: the sub-packages
# now publish under the owned @the-40-thieves scope (obsidian-tc-shared / obsidian-tc-native);
# the server stays the owned unscoped obsidian-tc. The pin-workspace-deps step below rewrites
# workspace:* to concrete versions (npm publish does not), so the published obsidian-tc carries
# real dep versions. The npm-publish jobs still require the NPM_TOKEN secret before a tag.
jobs:
  build-native:
    strategy:
      fail-fast: true
      matrix:
        include:
          - host: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            triple: linux-x64-gnu
          - host: macos-latest
            target: x86_64-apple-darwin
            triple: darwin-x64
          - host: macos-14
            target: aarch64-apple-darwin
            triple: darwin-arm64
          - host: windows-latest
            target: x86_64-pc-windows-msvc
            triple: win32-x64-msvc
    runs-on: ${{ matrix.host }}
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
      - run: bun install --frozen-lockfile
      - name: build native (.node)
        working-directory: packages/native
        run: bun run build -- --target ${{ matrix.target }}
        shell: bash
      - uses: actions/upload-artifact@v4
        with:
          name: native-${{ matrix.triple }}
          path: packages/native/*.node
          if-no-files-found: error

  publish-npm:
    needs: build-native
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'
      - run: bun install --frozen-lockfile
      - uses: actions/download-artifact@v4
        with:
          path: packages/native/artifacts
      - name: collect prebuilt .node files (napi)
        working-directory: packages/native
        run: bunx napi artifacts --dir artifacts
      - run: bun run --filter=shared build
      - run: bun run --filter=server build
      # npm publish does NOT rewrite the workspace: protocol, so pin workspace:* deps to concrete
      # versions before publishing — otherwise the published obsidian-tc would ship
      # "@the-40-thieves/obsidian-tc-shared": "workspace:*" and fail to install (THE-214).
      - name: pin workspace deps to concrete versions
        run: bun scripts/pin-workspace-deps.mjs
      # Platform sub-packages (one per built triple, @the-40-thieves/obsidian-tc-native-<triple>)
      # + the umbrella optionalDependencies are generated and published by `napi prepublish`.
      - name: publish platform sub-packages (napi)
        working-directory: packages/native
        run: bunx napi prepublish -t npm
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
      - run: cd packages/native && npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
      - run: cd packages/shared && npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
      - run: cd packages/server && npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  build-binaries:
    needs: publish-npm
    strategy:
      fail-fast: true
      matrix:
        include:
          - host: ubuntu-latest
            target: bun-linux-x64
          - host: macos-latest
            target: bun-darwin-x64
          - host: macos-14
            target: bun-darwin-arm64
          - host: windows-latest
            target: bun-windows-x64
    runs-on: ${{ matrix.host }}
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - run: bun run --filter=shared build
      - name: compile standalone binary
        run: bun build packages/server/src/cli.ts --compile --target=${{ matrix.target }} --outfile packages/server/dist/obsidian-tc-${{ matrix.target }}
        shell: bash
      - uses: actions/upload-artifact@v4
        with:
          name: binary-${{ matrix.target }}
          path: packages/server/dist/obsidian-tc-*

  build-plugin:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - run: bun run --filter=plugin build
      - name: zip plugin
        run: |
          cd packages/plugin/dist
          zip -r ../obsidian-tc-plugin-${GITHUB_REF_NAME#v}.zip main.js manifest.json styles.css
        shell: bash
      - uses: actions/upload-artifact@v4
        with:
          name: plugin
          path: packages/plugin/obsidian-tc-plugin-*.zip

  build-docker:
    needs: publish-npm
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: extract version
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
      - name: is pre-release
        id: prerelease
        run: |
          if [[ "${GITHUB_REF_NAME}" == *"-"* ]]; then
            echo "value=true" >> "$GITHUB_OUTPUT"
          else
            echo "value=false" >> "$GITHUB_OUTPUT"
          fi
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/the-40-thieves/obsidian-tc:${{ steps.version.outputs.version }}
            ${{ steps.prerelease.outputs.value == 'false' && format('ghcr.io/the-40-thieves/obsidian-tc:latest') || '' }}
          labels: |
            org.opencontainers.image.source=https://github.com/the-40-thieves/obsidian-tc
            org.opencontainers.image.version=${{ steps.version.outputs.version }}
            org.opencontainers.image.licenses=Apache-2.0

  draft-release:
    needs: [publish-npm, build-binaries, build-plugin, build-docker]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: generate checksums
        run: |
          cd artifacts
          find . -type f \( -name 'obsidian-tc-*' -o -name '*.zip' \) -exec sha256sum {} \; > SHASUMS256.txt
        shell: bash
      - uses: softprops/action-gh-release@v2
        with:
          draft: true
          generate_release_notes: true
          files: |
            artifacts/**/obsidian-tc-*
            artifacts/**/*.zip
            artifacts/SHASUMS256.txt

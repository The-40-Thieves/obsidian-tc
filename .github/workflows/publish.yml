name: publish
on:
  push:
    tags: ['v*']

permissions:
  contents: write
  packages: write
  id-token: write
  attestations: write

jobs:
  build-native:
    strategy:
      fail-fast: true
      matrix:
        include:
          - host: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            triple: linux-x64-gnu
          - host: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            triple: linux-arm64-gnu
            cross: true
          - host: macos-latest
            target: x86_64-apple-darwin
            triple: darwin-x64
          - host: macos-14
            target: aarch64-apple-darwin
            triple: darwin-arm64
          - host: windows-latest
            target: x86_64-pc-windows-msvc
            triple: win32-x64-msvc
    runs-on: ${{ matrix.host }}
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
      - name: install cross
        if: matrix.cross
        run: cargo install cross --locked
      - run: bun install --frozen-lockfile
      - name: build native
        working-directory: packages/native
        run: |
          if [ "${{ matrix.cross }}" = "true" ]; then
            bun run build:release:cross -- --target ${{ matrix.target }}
          else
            bun run build:release -- --target ${{ matrix.target }}
          fi
        shell: bash
      - uses: actions/upload-artifact@v4
        with:
          name: native-${{ matrix.triple }}
          path: packages/native/*.node
          if-no-files-found: error

  publish-npm:
    needs: build-native
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'
      - run: bun install --frozen-lockfile
      - uses: actions/download-artifact@v4
        with:
          path: packages/native/artifacts
      - name: assemble platform packages
        working-directory: packages/native
        run: bun run prepare-platform-packages
      - run: bun run --filter=shared build
      - run: bun run --filter=server build
      # The package.json files in packages/{native,shared,server} carry the canonical
      # @the-40-thieves/obsidian-tc-{native,shared} and obsidian-tc names respectively.
      # The defensive stub @the-40-thieves/obsidian-tc is NOT published here.
      - name: publish platform packages
        working-directory: packages/native
        run: bun run publish-platform-packages
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
      - run: cd packages/native && npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
      - run: cd packages/shared && npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
      - run: cd packages/server && npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  build-binaries:
    needs: publish-npm
    strategy:
      fail-fast: true
      matrix:
        include:
          - host: ubuntu-latest
            target: bun-linux-x64
          - host: ubuntu-latest
            target: bun-linux-arm64
          - host: macos-latest
            target: bun-darwin-x64
          - host: macos-14
            target: bun-darwin-arm64
          - host: windows-latest
            target: bun-windows-x64
    runs-on: ${{ matrix.host }}
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - run: bun run --filter=server build:standalone -- --target=${{ matrix.target }}
      - uses: actions/upload-artifact@v4
        with:
          name: binary-${{ matrix.target }}
          path: packages/server/dist/obsidian-tc-*

  build-plugin:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - run: bun run --filter=plugin build:release
      - name: zip plugin
        run: |
          cd packages/plugin/dist
          zip -r ../obsidian-tc-plugin-${GITHUB_REF_NAME#v}.zip main.js manifest.json styles.css
      - uses: actions/upload-artifact@v4
        with:
          name: plugin
          path: packages/plugin/obsidian-tc-plugin-*.zip

  build-docker:
    needs: publish-npm
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: extract version
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
      - name: is pre-release
        id: prerelease
        run: |
          if [[ "${GITHUB_REF_NAME}" == *"-"* ]]; then
            echo "value=true" >> "$GITHUB_OUTPUT"
          else
            echo "value=false" >> "$GITHUB_OUTPUT"
          fi
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/the-40-thieves/obsidian-tc:${{ steps.version.outputs.version }}
            ${{ steps.prerelease.outputs.value == 'false' && format('ghcr.io/the-40-thieves/obsidian-tc:latest') || '' }}
          labels: |
            org.opencontainers.image.source=https://github.com/the-40-thieves/obsidian-tc
            org.opencontainers.image.version=${{ steps.version.outputs.version }}
            org.opencontainers.image.licenses=Apache-2.0

  draft-release:
    needs: [publish-npm, build-binaries, build-plugin, build-docker]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: generate checksums
        run: |
          cd artifacts
          find . -type f \( -name 'obsidian-tc-*' -o -name '*.zip' \) -exec sha256sum {} \; > SHASUMS256.txt
      - name: generate SBOM
        run: |
          bunx @cyclonedx/cdxgen -o obsidian-tc.cdx.json
      - uses: sigstore/cosign-installer@v3
      - name: cosign sign
        run: |
          cd artifacts
          for f in $(find . -type f \( -name 'obsidian-tc-*' -o -name '*.zip' \)); do
            cosign sign-blob --yes --output-signature "${f}.sig" "$f"
          done
        env:
          COSIGN_EXPERIMENTAL: '1'
      - uses: softprops/action-gh-release@v2
        with:
          draft: true
          generate_release_notes: true
          files: |
            artifacts/**/obsidian-tc-*
            artifacts/**/*.zip
            artifacts/SHASUMS256.txt
            artifacts/**/*.sig
            obsidian-tc.cdx.json

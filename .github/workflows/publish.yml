name: publish
on:
  push:
    tags: ['v*']

permissions:
  contents: write
  packages: write
  id-token: write
  attestations: write

# M7 (THE-183) shipped a 4-platform native matrix with linux-arm64 deferred (G3 amendment,
# THE-141); it is now an 8-platform matrix — linux/darwin/win each x64 + arm64, plus linux x64 +
# arm64 musl. linux-arm64-gnu cross-compiles on the x64 ubuntu runner (gcc-aarch64-linux-gnu step
# below); win-arm64 via the bundled MSVC ARM64 tools; the two musl targets via `napi build -x`
# (cargo-zigbuild + setup-zig, gated to the musl rows). No cosign/SBOM
# (deferred to v1.1); text bun.lock. Fires only on a
# human-pushed v* tag — it is config-verified here, not executed. R5/THE-214: the sub-packages
# now publish under the owned @the-40-thieves scope (obsidian-tc-shared / obsidian-tc-native);
# the server stays the owned unscoped obsidian-tc. The pin-workspace-deps step below rewrites
# workspace:* to concrete versions (npm publish does not), so the published obsidian-tc carries
# real dep versions. The npm-publish jobs still require the NPM_TOKEN secret before a tag.
jobs:
  build-native:
    strategy:
      fail-fast: true
      matrix:
        include:
          - host: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            triple: linux-x64-gnu
          - host: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            triple: linux-arm64-gnu
          - host: macos-latest
            target: x86_64-apple-darwin
            triple: darwin-x64
          - host: macos-14
            target: aarch64-apple-darwin
            triple: darwin-arm64
          - host: windows-latest
            target: x86_64-pc-windows-msvc
            triple: win32-x64-msvc
          - host: windows-latest
            target: aarch64-pc-windows-msvc
            triple: win32-arm64-msvc
          - host: ubuntu-latest
            target: x86_64-unknown-linux-musl
            triple: linux-x64-musl
          - host: ubuntu-latest
            target: aarch64-unknown-linux-musl
            triple: linux-arm64-musl
    runs-on: ${{ matrix.host }}
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable (pinned, audit #11)
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
      - run: bun install --frozen-lockfile
      # musl targets cross-compile via napi's `-x` (cargo-zigbuild); zig is the linker. Gated to
      # the two musl rows only — the gnu / darwin / win rows are untouched.
      - name: install zig for musl cross-compile
        if: endsWith(matrix.target, '-musl')
        uses: goto-bus-stop/setup-zig@v2
        with:
          version: 0.13.0
      # linux-arm64 is cross-compiled on the x64 ubuntu runner, which has no aarch64 linker
      # by default. Install the GNU cross toolchain and point cargo's linker (and the cc
      # crate, for when the commented-out sqlite-vec/ndarray deps land) at it. The other five
      # targets need no extra step: darwin clang cross-compiles x64<->arm64, and the x64
      # windows runner ships the MSVC ARM64 tools, so napi builds them with just the rust target.
      - name: install aarch64 linux cross toolchain
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu
          {
            echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc"
            echo "CC_aarch64_unknown_linux_gnu=aarch64-linux-gnu-gcc"
            echo "CXX_aarch64_unknown_linux_gnu=aarch64-linux-gnu-g++"
          } >> "$GITHUB_ENV"
        shell: bash
      - name: build native (.node)
        working-directory: packages/native
        run: bun run build -- --target ${{ matrix.target }} ${{ endsWith(matrix.target, '-musl') && '-x' || '' }}
        shell: bash
      - uses: actions/upload-artifact@v4
        with:
          name: native-${{ matrix.triple }}
          path: packages/native/*.node
          if-no-files-found: error

  publish-npm:
    needs: build-native
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'
      - run: bun install --frozen-lockfile
      - uses: actions/download-artifact@v4
        with:
          path: packages/native/artifacts
      # napi artifacts only *fills* per-platform dirs; it does not create them.
      # create-npm-dirs generates npm/<triple>/ (scoped @the-40-thieves/obsidian-tc-native-<triple>)
      # from the napi config before the .node files are moved in.
      - name: create napi npm dirs (per-platform package dirs)
        working-directory: packages/native
        run: bunx napi create-npm-dirs
      - name: collect prebuilt .node files (napi)
        working-directory: packages/native
        run: bunx napi artifacts --output-dir artifacts
      # Build via working-directory (not --filter): the rename moved packages off the bare
      # names, so `--filter=shared|server` matched nothing. Mirrors the passing ci-* workflows.
      - name: build shared
        working-directory: packages/shared
        run: bun run build
      - name: build server
        working-directory: packages/server
        run: bun run build
      # npm publish does NOT rewrite the workspace: protocol, so pin workspace:* deps to concrete
      # versions before publishing — otherwise the published obsidian-tc would ship
      # "@the-40-thieves/obsidian-tc-shared": "workspace:*" and fail to install (THE-214).
      - name: pin workspace deps to concrete versions
        run: bun scripts/pin-workspace-deps.mjs
      # F3 preflight: npm publish is immutable and this job publishes 3 packages (+ napi
      # sub-packages) sequentially with no rollback. If any target version is already on npm,
      # fail BEFORE the first publish so a re-run cannot half-publish a version-skewed release.
      # (Checks the umbrella packages; platform sub-packages track the native version.)
      - name: preflight — assert target versions are unpublished (F3)
        run: |
          set -euo pipefail
          fail=0
          check() {
            local dir="$1" name version
            name=$(node -p "require('./$dir/package.json').name")
            version=$(node -p "require('./$dir/package.json').version")
            if npm view "$name@$version" version >/dev/null 2>&1; then
              echo "::error::$name@$version is already published; bump the version before tagging."
              fail=1
            else
              echo "ok: $name@$version is unpublished"
            fi
          }
          check packages/native
          check packages/shared
          check packages/server
          # platform sub-packages generated by napi create-npm-dirs (THE-224)
          for d in packages/native/npm/*/; do
            check "${d%/}"
          done
          [ "$fail" -eq 0 ]
        shell: bash
      # Platform sub-packages (one per built triple, @the-40-thieves/obsidian-tc-native-<triple>)
      # + the umbrella optionalDependencies are generated and published by `napi pre-publish`.
      - name: publish platform sub-packages (napi)
        working-directory: packages/native
        run: bunx napi pre-publish -t npm --no-gh-release
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
      # THE-224 atomic publish: umbrellas go to a holding `pending` dist-tag, never straight to
      # `latest`. npm publish is immutable, so a mid-sequence failure would otherwise strand a
      # half-published release on `latest` with no rollback. `pending` keeps `latest` on the
      # previous good release until every umbrella is up.
      - name: publish umbrellas to pending dist-tag (native, shared, server)
        run: |
          set -euo pipefail
          (cd packages/native && npm publish --provenance --access public --tag pending)
          (cd packages/shared && npm publish --provenance --access public --tag pending)
          (cd packages/server && npm publish --provenance --access public --tag pending)
        shell: bash
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
      # Promote to `latest` only after all three are on `pending`, in dependency order with the
      # user-facing server LAST. `npm dist-tag add` is idempotent, so a failed promotion can be
      # re-run. After this `obsidian-tc@latest` resolves to a fully consistent release.
      - name: promote umbrellas to latest (server last)
        run: |
          set -euo pipefail
          promote() {
            local dir="$1" name version
            name=$(node -p "require('./$dir/package.json').name")
            version=$(node -p "require('./$dir/package.json').version")
            npm dist-tag add "$name@$version" latest
            echo "promoted: $name@$version -> latest"
          }
          promote packages/native
          promote packages/shared
          promote packages/server
        shell: bash
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  build-binaries:
    needs: publish-npm
    strategy:
      fail-fast: true
      matrix:
        include:
          - host: ubuntu-latest
            target: bun-linux-x64
          - host: ubuntu-latest
            target: bun-linux-arm64
          - host: macos-latest
            target: bun-darwin-x64
          - host: macos-14
            target: bun-darwin-arm64
          - host: windows-latest
            target: bun-windows-x64
    runs-on: ${{ matrix.host }}
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - name: build shared
        working-directory: packages/shared
        run: bun run build
      - name: compile standalone binary
        run: bun build packages/server/src/cli.ts --compile --bytecode --minify --sourcemap --target=${{ matrix.target }} --outfile packages/server/dist/obsidian-tc-${{ matrix.target }}
        shell: bash
      - uses: actions/upload-artifact@v4
        with:
          name: binary-${{ matrix.target }}
          path: packages/server/dist/obsidian-tc-*

  build-plugin:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - name: build plugin
        working-directory: packages/plugin
        run: bun run build
      - name: zip plugin
        run: |
          cd packages/plugin/dist
          zip -r ../obsidian-tc-plugin-${GITHUB_REF_NAME#v}.zip main.js manifest.json
        shell: bash
      - uses: actions/upload-artifact@v4
        with:
          name: plugin
          path: packages/plugin/obsidian-tc-plugin-*.zip

  build-docker:
    needs: publish-npm
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: extract version
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
      - name: is pre-release
        id: prerelease
        run: |
          if [[ "${GITHUB_REF_NAME}" == *"-"* ]]; then
            echo "value=true" >> "$GITHUB_OUTPUT"
          else
            echo "value=false" >> "$GITHUB_OUTPUT"
          fi
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/the-40-thieves/obsidian-tc:${{ steps.version.outputs.version }}
            ${{ steps.prerelease.outputs.value == 'false' && format('ghcr.io/the-40-thieves/obsidian-tc:latest') || '' }}
          labels: |
            org.opencontainers.image.source=https://github.com/the-40-thieves/obsidian-tc
            org.opencontainers.image.version=${{ steps.version.outputs.version }}
            org.opencontainers.image.licenses=AGPL-3.0-only

  build-mcpb:
    needs: publish-npm
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - name: build shared + server
        run: |
          (cd packages/shared && bun run build)
          (cd packages/server && bun run build)
      - name: pack the .mcpb bundle
        run: bun run bundle
      - uses: actions/upload-artifact@v4
        with:
          name: mcpb
          path: dist/obsidian-tc.mcpb

  draft-release:
    needs: [publish-npm, build-binaries, build-plugin, build-docker, build-mcpb]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          # only the assets the release attaches; skip native-* and the .dockerbuild record
          pattern: '{binary-*,plugin,mcpb}'
      - name: generate checksums
        run: |
          cd artifacts
          find . -type f \( -name 'obsidian-tc-*' -o -name '*.mcpb' -o -name '*.zip' \) -exec sha256sum {} \; > SHASUMS256.txt
        shell: bash
      - uses: softprops/action-gh-release@v2
        with:
          draft: true
          generate_release_notes: true
          files: |
            artifacts/**/obsidian-tc-*
            artifacts/**/*.mcpb
            artifacts/**/*.zip
            artifacts/SHASUMS256.txt

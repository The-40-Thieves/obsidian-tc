# gitleaks configuration for obsidian-tc.
#
# Extends the upstream default ruleset and allowlists known benign secret-shaped content:
# the secret-scanner's OWN detection regexes, test fixtures that deliberately embed fake
# credentials to prove redaction, illustrative tokens in a design doc, and build/dep output
# (dist, node_modules) which is not source. None are real credentials. Wired into CI via
# .github/workflows/ci-security.yml, which scans the working tree (--no-git): the PR gate is
# about what ships, not immutable history.

[extend]
useDefault = true

[allowlist]
description = "Benign secret-shaped content: scanner regexes, test fixtures, doc examples, build output"
regexes = [
  '''tok_a1b2c3d4''',
]
paths = [
  '''packages/server/test/.*''',
  # Perf-harness eval code + its committed baseline: metric-key literals like
  # `key: "retrieval.ndcg_at10"` trip the generic-api-key rule (THE-459). No credentials here.
  '''packages/server/eval/.*''',
  # Superpowers design/plan docs: illustrative code snippets, same class as G2.5 below.
  '''docs/superpowers/.*''',
  '''packages/server/src/search/secrets\.ts''',
  '''packages/server/src/experiential/episodes\.ts''',
  '''docs/G2\.5-release-engineering\.md''',
  '''(^|/)dist/''',
  '''(^|/)node_modules/''',
]

[package]
name = "obsidian-tc-native"
version = "0.0.0"
edition = "2024"
license = "AGPL-3.0-only"
description = "Native perf module for obsidian-tc"
repository = "https://github.com/The-40-Thieves/obsidian-tc"

[lib]
crate-type = ["cdylib"]

[dependencies]
napi = { version = "3", features = ["napi8"] }
napi-derive = "3"

# Vector and matrix ops (pinned in G2.5)
# ndarray = "0.16"
# nalgebra = "0.33"

# SQLite extension (pinned in G2.3)
# sqlite-vec = "0.1"

# V2-only — commented until V2 work begins
# petgraph = "0.6"

[build-dependencies]
napi-build = "2"

# THE-272: symlink-safe, TOCTOU-free vault file I/O via per-component openat(O_NOFOLLOW). Unix only —
# the Windows path uses std (symlink creation there is admin/developer-mode gated).
[target.'cfg(unix)'.dependencies]
rustix = { version = "1", features = ["fs"] }

[profile.release]
lto = true
codegen-units = 1
opt-level = 3

[dev-dependencies]
criterion = "0.8.2"

# THE-504: old-vs-new cosine_batch algorithm + f32-vs-f64-accumulation benches. `harness = false`
# because Criterion provides its own `main` (via `criterion_main!`) instead of libtest's.
[[bench]]
name = "cosine_batch"
harness = false

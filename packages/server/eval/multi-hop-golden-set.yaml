    description: |
      Tests music-visual → Aedras cosmology bridging.
      Cyberpunk/industrial Slurpees aesthetic vs Aedras sacred-geometry Surath era.
      No explicit wikilinks between 06-music/07-visual and 05-creative/Aedras.
      Predicted v1 failure. LLM enrichment would connect via visual-as-worldbuilding axis.


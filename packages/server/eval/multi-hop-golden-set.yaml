# Multi-hop golden set — 10 queries across domain pairs.
#
# Per-query schema:
#   id              kebab-case, unique
#   query_text      string sent to search functions verbatim
#   seed_domain     informational label
#   target_domain   informational label
#   seed_paths      paths in seed domain a successful result should surface
#   target_paths    paths in target domain a successful result should surface
#   bridge_paths    paths explicitly connecting seed + target ([] if none exist in vault)
#   description     what this query tests
#
# Recall@10:       |union(seed_paths, target_paths, bridge_paths) ∩ top10| / |union|
# MRR@10:          1 / rank of first expected path in top-10, else 0
# Bridge_recall:   if bridge_paths non-empty: 1 if any bridge_path in result set
#                  if bridge_paths empty:     1 if any seed_path AND any target_path in result set
#
# Ship gate: vault_graph_search beats vault_search by >=20pp recall@10 on this set.
# Regression guard: existing 30-query set must not drop >5pp (run separately).
#
# Note: 03-health/ folder is NOT in vault_chunks (unindexed as of 2026-05-08).
# Health queries proxy through 02-projects/Health Optimization System.md.
# Real health notes (Mounjaro dosing, labs, med schedule) will need vault-sync
# to embed 03-health/ before health-specific queries can be meaningful.

queries:
  # ── CLEAN FAILURE CASES (bridge_paths: []) ─────────────────────────────────
  # These test whether graph expansion bridges truly disconnected domains.
  # v1 (wikilinks only) predicted to fail; v1.1 (LLM enrichment) predicted to fix.

  - id: health-proxy-to-aedras-endurance
    query_text: "What connections exist between my health optimization system design and themes of endurance and survival in my fantasy world?"
    seed_domain: projects-health
    target_domain: aedras
    seed_paths:
      - "02-projects\\Health Optimization System.md"
    target_paths:
      - "05-creative\\Aedras\\Figures\\The Walking Immortal.md"
      - "05-creative\\Aedras\\Institutions\\The Long-Lived.md"
      - "05-creative\\Aedras\\Foundation\\The Four Tensions.md"
    bridge_paths: []
    description: |
      Proxy for the original cardiac→Aedras query (03-health/ unindexed).
      Tests health-as-project-thinking vs Aedras immortality/endurance motifs.
      Wikilink expansion from 02-projects unlikely to reach 05-creative.
      Predicted v1 failure; v1.1 LLM enrichment should bridge via
      "sustained systems" / "endurance" semantic axis.

